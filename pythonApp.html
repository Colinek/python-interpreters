<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyodide Python Interpreter</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        textarea { width: 100%; height: 250px; font-family: monospace; font-size: 14px; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 0; cursor: pointer; background-color: #005A9C; color: white; border: none; border-radius: 4px;}
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        pre { background-color: #f4f4f4; padding: 15px; border: 1px solid #ddd; overflow-x: auto; min-height: 50px; font-family: monospace; }
        .error { color: red; }
    </style>
</head>
<body>

    <h1>Web Python Interpreter</h1>
    <p id="status">Status: Loading Pyodide... Please wait.</p>

    <textarea id="code-input"># 1. Import micropip (Pyodide's version of pip)
import micropip

# 2. Install a third-party library from PyPI asynchronously
await micropip.install('cowsay')

# 3. Import and use the library!
import cowsay
cowsay.cow('Modules are working in the browser!')
</textarea>

    <br>
    <button id="run-btn" disabled>Run Code</button>

    <h3>Output:</h3>
    <pre id="output"></pre>

    <script>
        const outputDiv = document.getElementById("output");
        const codeInput = document.getElementById("code-input");
        const runBtn = document.getElementById("run-btn");
        const statusText = document.getElementById("status");

        let pyodide;

        async function main() {
            try {
                pyodide = await loadPyodide({
                    // Make sure this line is included!
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/",
                    stdout: (text) => { outputDiv.innerHTML += text + "\n"; }
                });
                
                await pyodide.loadPackage("micropip");
                statusText.innerText = "Status: Ready!";
                runBtn.disabled = false;
            } catch (err) {
                statusText.innerText = "Status: Failed to load Pyodide.";
                outputDiv.innerHTML = `<span class="error">${err}</span>`;
            }
        }

        main();

        runBtn.addEventListener("click", async () => {
            outputDiv.innerHTML = "";
            const code = codeInput.value;
            runBtn.disabled = true;

            try {
                statusText.innerText = "Status: Analyzing and downloading packages...";
                
                // Automatically loads official Pyodide C-extension packages (like numpy) if it sees them in the imports
                await pyodide.loadPackagesFromImports(code);
                
                statusText.innerText = "Status: Running code...";
                
                let result = await pyodide.runPythonAsync(code);
                
                if (result !== undefined) {
                    outputDiv.innerHTML += `<i>Returned:</i> ${result}\n`;
                }
                statusText.innerText = "Status: Ready!";
            } catch (err) {
                statusText.innerText = "Status: Ready (with errors).";
                outputDiv.innerHTML += `<span class="error">${err}</span>\n`;
            } finally {
                runBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
